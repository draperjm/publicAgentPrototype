server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's internal DNS resolver — forces nginx to re-resolve service names at runtime
    resolver 127.0.0.11 valid=10s ipv6=off;

    location /api/decomposer/ {
        set $responder http://responder:8000;
        rewrite ^/api/decomposer/(.*) /$1 break;
        proxy_pass         $responder;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_connect_timeout 15s;
        proxy_read_timeout    120s;
        proxy_send_timeout    30s;
        client_max_body_size  50m;
    }

    location /api/orchestrator/ {
        set $orchestrator http://orchestrator:8001;
        rewrite ^/api/orchestrator/(.*) /$1 break;
        proxy_pass         $orchestrator;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_connect_timeout 15s;
        proxy_read_timeout    1200s;
        proxy_send_timeout    120s;
        client_max_body_size  50m;
        # Disable buffering so streaming keepalive bytes reach the browser immediately,
        # preventing the WSL2 NAT TCP reset on long-running steps.
        proxy_buffering       off;
    }

    location /api/chunker/ {
        set $chunker http://document-chunker:8091;
        rewrite ^/api/chunker/(.*) /$1 break;
        proxy_pass         $chunker;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        proxy_connect_timeout 15s;
        proxy_read_timeout    300s;
        proxy_send_timeout    30s;
        client_max_body_size  100m;
    }

    location / {
        try_files $uri $uri/ =404;
        # Never cache HTML so JS changes take effect immediately
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
}
