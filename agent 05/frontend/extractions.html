function focusSection(itemEl, sectionName, page, docIdx) {
    // Deactivate previous active item
    if (activeItemEl) activeItemEl.classList.remove('active');
    activeItemEl = itemEl;
    itemEl.classList.add('active');

    // Dim all sections first
    const allSecs = document.querySelectorAll('#rightPane .src-sec');
    allSecs.forEach(el => { el.classList.remove('highlighted'); el.classList.add('dimmed'); });

    const norm     = normStr(sectionName);
    const byName   = sectionRegistry[norm] || [];
    const byPage   = [];
    // Also try matching by page number if name lookup fails
    if (byName.length === 0 && page > 0) {
        allSecs.forEach(el => { if (parseInt(el.dataset.page||0) === parseInt(page)) byPage.push(el.id); });
    }

    const targets = byName.length > 0 ? byName : byPage;

    if (targets.length > 0) {
        const el = document.getElementById(targets[0]);
        if (el) {
            el.classList.remove('dimmed');
            el.classList.add('highlighted');
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
        document.getElementById('rightHint').textContent =
            byName.length > 0 ? `Showing: ${sectionName || 'section'}` : `Showing: page ${page}`;
    } else {
        // No match — undim all
        allSecs.forEach(el => el.classList.remove('dimmed'));
        document.getElementById('rightHint').textContent = 'No matching section found';
    }
}

function clearFocus() {
    if (activeItemEl) { activeItemEl.classList.remove('active'); activeItemEl = null; }
    document.querySelectorAll('#rightPane .src-sec').forEach(el => {
        el.classList.remove('highlighted','dimmed');
    });
    const hint = document.getElementById('rightHint');
    if (hint) hint.textContent = 'All sections shown';
}

function toggleCat(id) {
    const el = document.getElementById(id);
    const ch = document.getElementById(id+'-c');
    if (!el) return;
    const open = el.style.display !== 'none';
    el.style.display = open ? 'none' : '';
    if (ch) ch.classList.toggle('open', !open);
}

// ═══════════════════════════════════════════════════════════
//  NON-EXTRACTION RENDERERS
// ═══════════════════════════════════════════════════════════
function renderFile(filename, data) {
    if (filename.startsWith('DocumentReview_'))  return renderDocumentReview(filename, data);
    if (filename.startsWith('ProcessingPlan_'))  return renderProcessingPlan(filename, data);
    if (filename.startsWith('TestReport_'))      return renderTestReport(filename, data);
    return `<div class="raw-json">${syntaxHL(data)}</div>`;
}

function renderDocumentReview(filename, data) {
    const docs  = data.documents || [];
    const scans = data.scan_results || [];
    let html = `<div class="page-title">Document Review</div>
    <div class="page-sub">${filename}</div>
    <div class="stat-bar" style="margin-top:10px;">
        <div class="stat-item"><div class="stat-val">${data.total_files_scanned||scans.length}</div><div class="stat-lbl">Scanned</div></div>
        <div class="stat-sep"></div>
        <div class="stat-item"><div class="stat-val" style="color:#22c55e;">${data.matched_files||docs.length}</div><div class="stat-lbl">Matched</div></div>
        <div class="stat-sep"></div>
        <div class="stat-item"><div class="stat-val" style="color:#ef4444;">${(data.total_files_scanned||scans.length)-(data.matched_files||docs.length)}</div><div class="stat-lbl">Unmatched</div></div>
    </div>`;
    if (docs.length) {
        html += `<div class="section-title">Matched Documents</div>`;
        for (const doc of docs) {
            const conf = doc.confidence||0, confPct = Math.round(conf*100);
            const cc   = conf>=.8?'#22c55e':conf>=.5?'#f59e0b':'#ef4444';
            html += `<div class="dr-doc-card">
                <div class="dr-doc-icon">📄</div>
                <div>
                    <div class="dr-doc-filename">${escHtml(doc.filename)}</div>
                    <div class="dr-doc-title">${escHtml(doc.document_title||'—')}</div>
                    <div class="dr-meta-row">
                        ${doc.document_type?`<span class="badge badge-blue">${escHtml(doc.document_type)}</span>`:''}
                        ${doc.author?`<div class="dr-meta-item"><span class="dr-meta-lbl">Author</span><span class="dr-meta-val">${escHtml(doc.author)}</span></div>`:''}
                        ${doc.date?`<div class="dr-meta-item"><span class="dr-meta-lbl">Date</span><span class="dr-meta-val">${doc.date}</span></div>`:''}
                        ${doc.project_number?`<div class="dr-meta-item"><span class="dr-meta-lbl">Project</span><span class="dr-meta-val">${escHtml(doc.project_number)}</span></div>`:''}
                        ${doc.revision?`<div class="dr-meta-item"><span class="dr-meta-lbl">Rev</span><span class="dr-meta-val">${escHtml(doc.revision)}</span></div>`:''}
                        ${doc.text_quality?`<span class="badge ${doc.text_quality==='high'?'badge-green':'badge-amber'}">${doc.text_quality}</span>`:''}
                    </div>
                </div>
                <div class="dr-conf">
                    <div class="dr-conf-val" style="color:${cc};">${confPct}%</div>
                    <div class="dr-conf-bar"><div class="dr-conf-fill" style="width:${confPct}%;background:${cc};"></div></div>
                    <div style="font-size:.59rem;color:var(--text-muted);">Confidence</div>
                </div>
            </div>`;
        }
    }
    if (scans.length) {
        html += `<div class="section-title">All Files Scanned</div>
        <table class="scan-table"><thead><tr><th>File</th><th>Type</th><th>Size</th><th>Quality</th><th>Match</th><th>Conf</th></tr></thead><tbody>`;
        for (const s of scans) {
            const conf = s.overall_confidence||0, confPct = Math.round(conf*100);
            const cc   = conf>=.8?'#22c55e':conf>=.5?'#f59e0b':'#ef4444';
            html += `<tr>
                <td style="font-family:monospace;font-size:.67rem;">${escHtml(s.filename)}</td>
                <td><span class="badge badge-gray">${escHtml(s.matched_document_type||'—')}</span></td>
                <td style="color:var(--text-muted);">${fmtSize(s.file_size_bytes||0)}</td>
                <td><span class="badge ${s.text_quality==='high'?'badge-green':'badge-amber'}">${s.text_quality||'—'}</span></td>
                <td>${(s.filename_match||s.content_match)?'✅':'⬜'}</td>
                <td style="color:${cc};">${confPct}%</td>
            </tr>`;
        }
        html += `</tbody></table>`;
    }
    return html;
}

function renderProcessingPlan(filename, data) {
    const plan = data.processing_plan || [];
    let html = `<div class="page-title">Processing Plan</div><div class="page-sub">${filename}</div>
    <div class="stat-bar" style="margin-top:10px;margin-bottom:16px;">
        <div class="stat-item"><div class="stat-val">${data.total_documents||plan.length}</div><div class="stat-lbl">Documents</div></div>
    </div>
    <table class="plan-table"><thead><tr><th>File</th><th>Type</th><th>Tool</th><th>Content</th><th>Quality</th><th>Convert</th></tr></thead><tbody>`;
    for (const p of plan) {
        html += `<tr>
            <td><div style="font-family:monospace;font-size:.69rem;">${escHtml(p.filename)}</div>${p.processing_notes?`<div class="plan-notes">${escHtml(p.processing_notes)}</div>`:''}</td>
            <td><span class="badge badge-blue">${escHtml(p.document_type||'—')}</span></td>
            <td style="font-family:monospace;font-size:.65rem;color:var(--text-muted);">${escHtml(p.processing_tool_id||'—')}</td>
            <td><span class="badge badge-gray">${escHtml(p.content_type||'—')}</span></td>
            <td><span class="badge ${p.text_quality==='high'?'badge-green':'badge-amber'}">${escHtml(p.text_quality||'—')}</span></td>
            <td>${p.conversion_required?`<span class="badge badge-amber">${escHtml(p.conversion_type||'Yes')}</span>`:'<span style="color:var(--text-muted);font-size:.7rem;">No</span>'}</td>
        </tr>`;
    }
    html += `</tbody></table>`;
    return html;
}

function renderTestReport(filename, data) {
    const tc    = data.test_cases || [];
    const pass  = tc.filter(t => t.result==='PASS').length;
    const score = data.overall_score ?? data.score;
    const valid = data.is_valid;
    let html = `<div class="page-title">Test Report</div><div class="page-sub">${filename}</div>
    <div class="stat-bar" style="margin-top:10px;margin-bottom:16px;">
        <div class="stat-item"><div class="stat-val" style="color:${valid?'#22c55e':'#ef4444'};">${valid?'Passed':'Failed'}</div><div class="stat-lbl">Result</div></div>
        ${score!=null?`<div class="stat-sep"></div><div class="stat-item"><div class="stat-val" style="color:${score>=70?'#22c55e':score>=50?'#f59e0b':'#ef4444'};">${score}%</div><div class="stat-lbl">Score</div></div>`:''}
        <div class="stat-sep"></div>
        <div class="stat-item"><div class="stat-val">${pass}/${tc.length}</div><div class="stat-lbl">Tests Passed</div></div>
        ${data.step_name?`<div class="stat-sep"></div><div class="stat-item"><div class="stat-val" style="font-size:.75rem;">${escHtml(data.step_name)}</div><div class="stat-lbl">Step</div></div>`:''}
    </div>`;
    if (data.summary) html += `<div class="section-title">Summary</div>
        <div style="background:var(--panel-bg);border:1px solid var(--panel-border);border-radius:8px;padding:12px 16px;font-size:.74rem;color:var(--text-muted);line-height:1.6;margin-bottom:16px;">${escHtml(data.summary)}</div>`;
    if (tc.length) {
        html += `<div class="section-title">Test Cases</div>`;
        for (const t of tc) {
            const ok = t.result==='PASS';
            html += `<div class="test-case">
                <div class="test-case-hdr">
                    <span>${ok?'✅':'❌'}</span>
                    <span class="test-case-name">${escHtml(t.name||t.test_name||'Test')}</span>
                    <span class="badge ${ok?'badge-green':'badge-red'}">${t.result||'—'}</span>
                </div>
                ${t.message||t.details?`<div class="test-case-body">${escHtml(t.message||t.details)}</div>`:''}
            </div>`;
        }
    }
    return html;
}

// ═══════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════
function normStr(s) { return (s||'').toLowerCase().replace(/\s+/g,' ').trim(); }
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return String(s||'').replace(/'/g,'&#39;').replace(/"/g,'&quot;'); }
function syntaxHL(data) {
    return String(typeof data==='string'?data:JSON.stringify(data,null,2))
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"([^"]+)":/g,'<span class="json-key">"$1"</span>:')
        .replace(/: "([^"]*)"/g,': <span class="json-str">"$1"</span>')
        .replace(/: (\d+\.?\d*)/g,': <span class="json-num">$1</span>')
        .replace(/: (true|false)/g,': <span class="json-bool">$1</span>')
        .replace(/: null/g,': <span class="json-null">null</span>');
}

// ─────────────────────────────────────────────────────────
//  KEY-VALUE TABLE RENDERER
// ─────────────────────────────────────────────────────────
// Render a single scalar/bool/array/object value as HTML (no outer table)
function renderKVValue(v) {
    if (typeof v === 'boolean') {
        return `<span class="${v ? 'bool-yes' : 'bool-no'}">${v ? '✓ Yes' : '✗ No'}</span>`;
    }
    if (Array.isArray(v)) {
        if (!v.length) return '<span style="color:var(--text-muted);">—</span>';
        // Array of objects → render each as a sub-table separated by a divider
        if (typeof v[0] === 'object' && v[0] !== null) {
            return v.map(obj => renderItemKV(obj, [])).join('<hr class="kv-arr-sep">');
        }
        // Array of primitives → inline chips
        return v.map(i => `<span class="kv-list-item">${escHtml(String(i))}</span>`).join(' ');
    }
    if (v && typeof v === 'object') {
        return renderItemKV(v, []);
    }
    return escHtml(String(v));
}

// Render an object as a two-column key/value table.
// skipKeys: fields already shown elsewhere (desc headline, meta pills).
function renderItemKV(item, skipKeys) {
    const SKIP = new Set(skipKeys || []);
    ['description','item_description','requirement','text'].forEach(k => SKIP.add(k));

    const entries = Object.entries(item).filter(([k, v]) =>
        !SKIP.has(k) && v !== null && v !== undefined && v !== ''
    );
    if (!entries.length) return '';

    let html = '<table class="kv-table">';
    for (const [k, v] of entries) {
        const valHtml = renderKVValue(v);
        if (valHtml === null) continue;
        html += `<tr><th>${escHtml(k.replace(/_/g,' '))}</th><td>${valHtml}</td></tr>`;
    }
    return html + '</table>';
}

// Render a nested object (e.g. supply_requirements whose values are arrays of items)
function renderNestedObj(val, color) {
    const entries = Object.entries(val);
    let html = '<div style="padding:4px 6px;">';
    for (const [sk, sv] of entries) {
        if (sv === null || sv === undefined || sv === '') continue;
        html += `<div class="kv-section-hdr">${escHtml(sk.replace(/_/g,' '))}</div>`;
        if (Array.isArray(sv)) {
            if (!sv.length) {
                html += `<span style="color:var(--text-muted);font-size:.65rem;padding-left:2px;">None found</span>`;
            } else {
                const SHOWN = ['description','item_description','requirement','text',
                               'source_section','source_page','funding_category',
                               'responsible_party','amount_or_formula','source_document'];
                html += sv.map(item => {
                    if (typeof item === 'string') return `<div class="cat-item" style="border-left:2px solid ${color}40;margin-bottom:3px;"><div class="cat-item-raw">${escHtml(item)}</div></div>`;
                    const desc = item.description || item.item_description || item.requirement || item.text || '';
                    return `<div class="cat-item" style="border-left:2px solid ${color}40;margin-bottom:3px;">
                        ${desc ? `<div class="cat-item-desc">${escHtml(desc)}</div>` : ''}
                        ${renderItemKV(item, SHOWN)}
                    </div>`;
                }).join('');
            }
        } else {
            html += renderKVValue(sv);
        }
    }
    return html + '</div>';
}

function toggleTheme() {
    const light = document.documentElement.classList.toggle('light');
    localStorage.setItem('theme', light ? 'light' : 'dark');
    const btn = document.getElementById('themeToggleBtn');
    if (btn) btn.textContent = light ? '🌙' : '☀️';
}
(function(){ const b=document.getElementById('themeToggleBtn'); if(b) b.textContent=document.documentElement.classList.contains('light')?'🌙':'☀️'; })();

boot();
