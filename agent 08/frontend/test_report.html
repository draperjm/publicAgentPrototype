<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Reports</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 32 32%27%3E%3Crect width=%2732%22 height=%2232%22 rx=%226%22 fill=%22%23161616%22/%3E%3Crect x=%228%22 y=%2210%22 width=%2216%22 height=%2212%22 rx=%223%22 fill=%22none%22 stroke=%22%234d9fff%22 stroke-width=%222%22/%3E%3Ccircle cx=%2212%22 cy=%2216%22 r=%221.5%22 fill=%22%234d9fff%22/%3E%3Ccircle cx=%2220%22 cy=%2216%22 r=%221.5%22 fill=%22%234d9fff%22/%3E%3Crect x=%2214%22 y=%227%22 width=%224%22 height=%223%22 rx=%221%22 fill=%22%234d9fff%22/%3E%3C/svg%3E">
<script>(function(){if(localStorage.getItem('theme')==='light')document.documentElement.classList.add('light');})()</script>
<style>
    :root {
        --bg: #0e0e10;
        --panel-bg: #141417;
        --panel-border: rgba(255,255,255,0.07);
        --header-bg: #111114;
        --text: #e0e0e0;
        --text-dim: #a0a0a0;
        --text-muted: #606070;
        --accent: #4d9fff;
        --pass: #22c55e;
        --fail: #ef4444;
        --warn: #f59e0b;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* ── HEADER ── */
    .hdr { height: 48px; background: var(--header-bg); border-bottom: 1px solid var(--panel-border); display: flex; align-items: center; gap: 14px; padding: 0 18px; flex-shrink: 0; }
    .hdr-back { font-size: 0.72rem; color: var(--text-muted); text-decoration: none; display: flex; align-items: center; gap: 5px; padding: 4px 10px; border: 1px solid var(--panel-border); border-radius: 5px; transition: color .15s, border-color .15s; }
    .hdr-back:hover { color: var(--text); border-color: rgba(255,255,255,0.18); }
    .hdr-title { font-size: 0.88rem; font-weight: 700; }
    .hdr-spacer { flex: 1; }
    .hdr-count { font-size: 0.7rem; color: var(--text-muted); padding: 3px 10px; border: 1px solid var(--panel-border); border-radius: 10px; }
    .hdr-filter { display: flex; gap: 6px; align-items: center; }
    .filter-btn { font-size: 0.67rem; font-weight: 600; padding: 3px 10px; border-radius: 9999px; cursor: pointer; border: 1px solid var(--panel-border); background: transparent; color: var(--text-muted); transition: all .15s; }
    .filter-btn.active { background: rgba(77,159,255,0.12); border-color: rgba(77,159,255,0.3); color: var(--accent); }
    .filter-btn.pass.active { background: rgba(34,197,94,0.12); border-color: rgba(34,197,94,0.3); color: var(--pass); }
    .filter-btn.fail.active { background: rgba(239,68,68,0.12); border-color: rgba(239,68,68,0.3); color: var(--fail); }

    /* ── LAYOUT ── */
    .body { display: flex; flex: 1; overflow: hidden; min-height: 0; }

    /* ── FILE TREE ── */
    .tree-panel { width: 270px; flex-shrink: 0; background: var(--panel-bg); border-right: 1px solid var(--panel-border); display: flex; flex-direction: column; overflow: hidden; }
    .tree-hdr { padding: 10px 14px 8px; border-bottom: 1px solid var(--panel-border); flex-shrink: 0; }
    .tree-hdr-title { font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: .09em; color: var(--text-muted); }
    .tree-search { margin-top: 7px; width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--panel-border); border-radius: 5px; color: var(--text); font-size: 0.72rem; padding: 5px 9px; outline: none; }
    .tree-search:focus { border-color: var(--accent); }
    .tree-scroll { flex: 1; overflow-y: auto; padding: 6px 0; }
    .tree-scroll::-webkit-scrollbar { width: 4px; }
    .tree-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    .tg-date { padding: 8px 14px 3px; font-size: 0.59rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
    .tg-date::before { content:''; display:block; width:8px; height:1px; background:var(--panel-border); }
    .tg-date::after  { content:''; flex:1; height:1px; background:var(--panel-border); }

    .tfile { display: flex; align-items: center; gap: 6px; padding: 5px 10px 5px 14px; cursor: pointer; border-radius: 5px; margin: 1px 6px; transition: background .1s; }
    .tfile:hover { background: rgba(255,255,255,0.04); }
    .tfile.sel { background: rgba(77,159,255,0.1); }
    .tfile-badge { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .tfile-badge.pass { background: var(--pass); }
    .tfile-badge.fail { background: var(--fail); }
    .tfile-badge.unknown { background: var(--text-muted); }
    .tfile-info { flex: 1; min-width: 0; }
    .tfile-name { font-size: 0.67rem; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tfile.sel .tfile-name { color: var(--accent); }
    .tfile-meta { font-size: 0.58rem; color: var(--text-muted); margin-top: 1px; display: flex; gap: 5px; align-items: center; }
    .tfile-score { font-size: 0.6rem; font-weight: 700; padding: 1px 5px; border-radius: 3px; flex-shrink: 0; }
    .tfile-score.pass { background: rgba(34,197,94,0.12); color: var(--pass); }
    .tfile-score.fail { background: rgba(239,68,68,0.12); color: var(--fail); }

    /* ── CONTENT ── */
    .content-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
    .content-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); gap: 10px; }
    .content-empty-icon { font-size: 2.5rem; opacity: 0.22; }
    .content-empty-txt { font-size: 0.82rem; opacity: 0.45; }
    .content-scroll { flex: 1; overflow-y: auto; padding: 20px 24px; min-height: 0; }
    .content-scroll::-webkit-scrollbar { width: 6px; }
    .content-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

    /* ── REPORT HEADER ── */
    .rpt-header { background: var(--panel-bg); border: 1px solid var(--panel-border); border-radius: 8px; padding: 16px 18px; margin-bottom: 14px; }
    .rpt-header-top { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 10px; }
    .rpt-result { font-size: 0.75rem; font-weight: 700; padding: 3px 10px; border-radius: 9999px; flex-shrink: 0; margin-top: 2px; }
    .rpt-result.PASS { background: rgba(34,197,94,0.15); color: var(--pass); border: 1px solid rgba(34,197,94,0.3); }
    .rpt-result.FAIL { background: rgba(239,68,68,0.15); color: var(--fail); border: 1px solid rgba(239,68,68,0.3); }
    .rpt-step-name { font-size: 0.95rem; font-weight: 700; line-height: 1.3; flex: 1; }
    .rpt-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .rpt-meta-item { font-size: 0.65rem; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }
    .rpt-meta-item strong { color: var(--text-dim); }

    /* ── SCORE CARDS ── */
    .score-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 14px; }
    .score-card { background: var(--panel-bg); border: 1px solid var(--panel-border); border-radius: 7px; padding: 12px 14px; text-align: center; }
    .score-val { font-size: 1.6rem; font-weight: 700; line-height: 1; margin-bottom: 3px; }
    .score-val.pass  { color: var(--pass); }
    .score-val.fail  { color: var(--fail); }
    .score-val.total { color: var(--text); }
    .score-val.pct   { color: var(--accent); }
    .score-label { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--text-muted); }

    /* ── SCORE BAR ── */
    .score-bar-wrap { background: var(--panel-bg); border: 1px solid var(--panel-border); border-radius: 7px; padding: 10px 14px; margin-bottom: 14px; }
    .score-bar-label { display: flex; justify-content: space-between; font-size: 0.65rem; color: var(--text-muted); margin-bottom: 5px; }
    .score-bar-track { height: 7px; background: rgba(255,255,255,0.06); border-radius: 9999px; overflow: hidden; }
    .score-bar-fill  { height: 100%; border-radius: 9999px; transition: width .4s ease; }
    .score-bar-fill.pass { background: var(--pass); }
    .score-bar-fill.fail { background: var(--fail); }
    .score-summary { font-size: 0.72rem; color: var(--text-dim); margin-top: 8px; line-height: 1.5; }

    /* ── SECTION TITLE ── */
    .sec-title { font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--text-muted); margin: 16px 0 7px; border-bottom: 1px solid var(--panel-border); padding-bottom: 5px; display: flex; align-items: center; gap: 6px; }
    .sec-count { font-size: 0.6rem; padding: 1px 6px; border-radius: 9999px; background: rgba(255,255,255,0.06); color: var(--text-muted); }
    .sec-count.fail { background: rgba(239,68,68,0.12); color: var(--fail); }

    /* ── TEST CASE CARDS ── */
    .tc-card { border: 1px solid rgba(255,255,255,0.06); border-radius: 6px; margin-bottom: 5px; overflow: hidden; }
    .tc-card.pass { border-left: 3px solid var(--pass); }
    .tc-card.fail { border-left: 3px solid var(--fail); }
    .tc-hdr { display: flex; align-items: center; gap: 6px; padding: 7px 10px; cursor: pointer; user-select: none; background: rgba(255,255,255,0.02); transition: background .15s; }
    .tc-hdr:hover { background: rgba(255,255,255,0.05); }
    .tc-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .tc-dot.pass { background: var(--pass); }
    .tc-dot.fail { background: var(--fail); }
    .tc-id { font-size: 0.62rem; font-weight: 700; color: var(--text-muted); font-family: monospace; flex-shrink: 0; }
    .tc-name { font-size: 0.73rem; font-weight: 600; flex: 1; color: var(--text); }
    .tc-cat { font-size: 0.57rem; font-weight: 700; padding: 2px 7px; border-radius: 9999px; text-transform: uppercase; letter-spacing: .04em; flex-shrink: 0; }
    .tc-cat.completeness  { background: rgba(77,159,255,0.12);  color: #4d9fff; }
    .tc-cat.correctness   { background: rgba(245,158,11,0.12);  color: #f59e0b; }
    .tc-cat.format        { background: rgba(139,92,246,0.12);  color: #a78bfa; }
    .tc-cat.consistency   { background: rgba(168,85,247,0.12);  color: #c084fc; }
    .tc-cat.data_integrity{ background: rgba(20,184,166,0.12);  color: #2dd4bf; }
    .tc-chev { font-size: 0.6rem; color: var(--text-muted); transition: transform .2s; flex-shrink: 0; }
    .tc-chev.open { transform: rotate(180deg); }
    .tc-body { display: none; padding: 10px 12px; border-top: 1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.2); font-size: 0.7rem; line-height: 1.55; }
    .tc-body.open { display: block; }
    .tc-row { margin-bottom: 8px; }
    .tc-lbl { font-size: 0.58rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted); margin-bottom: 2px; }
    .tc-val { color: var(--text-dim); word-break: break-word; }
    .tc-val.expected { color: #60a5fa; }
    .tc-val.actual.ok { color: #4ade80; }
    .tc-val.actual.mismatch { color: #f87171; }
    .tc-reason { background: rgba(0,0,0,0.3); padding: 6px 9px; border-radius: 5px; border: 1px solid rgba(255,255,255,0.05); color: var(--text-dim); font-size: 0.68rem; line-height: 1.5; }
    .tc-notes  { background: rgba(0,0,0,0.2); padding: 6px 9px; border-radius: 5px; border: 1px solid rgba(255,255,255,0.04); color: var(--text-muted); font-size: 0.66rem; line-height: 1.5; font-family: 'Courier New', monospace; }

    /* ── ISSUES / RECS ── */
    .issue-list, .rec-list { display: flex; flex-direction: column; gap: 4px; }
    .issue-item { padding: 7px 10px; border-radius: 5px; background: rgba(239,68,68,0.07); border: 1px solid rgba(239,68,68,0.15); font-size: 0.71rem; color: #fca5a5; line-height: 1.5; }
    .rec-item   { padding: 7px 10px; border-radius: 5px; background: rgba(77,159,255,0.07); border: 1px solid rgba(77,159,255,0.15); font-size: 0.71rem; color: #93c5fd; line-height: 1.5; }

    /* ── LOADING ── */
    .loading { display: flex; align-items: center; justify-content: center; padding: 40px; color: var(--text-muted); font-size: 0.82rem; gap: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }

    /* Scrollbars */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
    .theme-toggle-btn { background: transparent; border: 1px solid var(--panel-border); border-radius: 6px; color: var(--text-muted); cursor: pointer; font-size: 0.9rem; padding: 4px 8px; line-height: 1; transition: background .15s; }
    .theme-toggle-btn:hover { background: rgba(128,128,128,0.1); }
</style>
<style>
    /* ── LIGHT MODE ── */
    html.light { color-scheme: light; --bg: #f1f2f4; --panel-bg: #f7f7f9; --panel-border: rgba(0,0,0,0.09); --header-bg: #eaeaee; --text: #18181b; --text-dim: #4a4c54; --text-muted: #8a8c9a; --accent: #2563eb; --pass: #16a34a; --fail: #dc2626; --warn: #d97706; }
    html.light .tc-card { background: #fafafa; border-color: rgba(0,0,0,0.09); }
    html.light .tc-hdr { background: rgba(0,0,0,0.02); }
    html.light .tc-body { background: rgba(0,0,0,0.01); color: #374151; }
    html.light .tc-field { border-bottom-color: rgba(0,0,0,0.05); }
    html.light .file-item { background: rgba(0,0,0,0.02); }
    html.light .file-item:hover { background: rgba(0,0,0,0.05); }
    html.light .file-item.sel { background: rgba(37,99,235,0.08); }
    html.light ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); }
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
    <a href="/" class="hdr-back">← Back</a>
    <div class="hdr-title">Test Reports</div>
    <div class="hdr-filter">
        <button class="filter-btn active" id="filterAll"  onclick="setFilter('all')">All</button>
        <button class="filter-btn pass"   id="filterPass" onclick="setFilter('pass')">Pass</button>
        <button class="filter-btn fail"   id="filterFail" onclick="setFilter('fail')">Fail</button>
    </div>
    <div class="hdr-spacer"></div>
    <button id="themeToggleBtn" class="theme-toggle-btn" onclick="toggleTheme()" title="Toggle light/dark mode"></button>
    <div class="hdr-count" id="fileCount">Loading…</div>
</div>

<div class="body">

    <!-- FILE LIST -->
    <div class="tree-panel">
        <div class="tree-hdr">
            <div class="tree-hdr-title">Test Reports</div>
            <input class="tree-search" id="treeSearch" type="text" placeholder="Filter reports…" oninput="renderTree()">
        </div>
        <div class="tree-scroll" id="treeScroll">
            <div class="loading"><div class="spinner"></div> Loading…</div>
        </div>
    </div>

    <!-- CONTENT -->
    <div class="content-panel">
        <div class="content-empty" id="contentEmpty">
            <div class="content-empty-icon">📋</div>
            <div class="content-empty-txt">Select a test report to view</div>
        </div>
        <div class="content-scroll" id="contentScroll" style="display:none;">
            <div id="reportContent"></div>
        </div>
    </div>
</div>

<script>
const API = '/api/orchestrator';

let allFiles   = [];   // {filename, size_bytes, modified_ts, result, score, stepName, ts}
let activeFile = null;
let filterMode = 'all';

// ── Boot ─────────────────────────────────────────────────────────────────────

async function boot() {
    try {
        const res   = await fetch(`${API}/output_files`);
        const data  = await res.json();
        const raw   = (data.files || []).filter(f => f.filename.startsWith('TestReport_'));

        // Pre-fetch summaries for badge display (parallel, lightweight)
        allFiles = await Promise.all(raw.map(async f => {
            let result = 'unknown', score = null, stepName = '';
            try {
                const r  = await fetch(`${API}/output_file/${encodeURIComponent(f.filename)}`);
                const d  = await r.json();
                const s  = d.test_run_summary || {};
                result   = (s.overall_result || '').toLowerCase() || 'unknown';
                score    = s.score != null ? s.score : null;
                stepName = (d.report_metadata || {}).step_name || '';
            } catch(_) {}
            // Parse timestamp from filename: TestReport_..._YYYYMMDD_HHMMSS.json
            const m = f.filename.match(/(\d{8})_(\d{6})\.json$/);
            const ts = m ? `${m[1].slice(0,4)}-${m[1].slice(4,6)}-${m[1].slice(6,8)} ${m[2].slice(0,2)}:${m[2].slice(2,4)}:${m[2].slice(4,6)}` : '';
            return { ...f, result, score, stepName, ts };
        }));

        document.getElementById('fileCount').textContent = `${allFiles.length} report${allFiles.length !== 1 ? 's' : ''}`;
        renderTree();
    } catch(e) {
        document.getElementById('treeScroll').innerHTML = `<div style="padding:14px;font-size:0.72rem;color:#ef4444;">Failed to load: ${e.message}</div>`;
    }
}

// ── Filter ───────────────────────────────────────────────────────────────────

function setFilter(mode) {
    filterMode = mode;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(mode === 'all' ? 'filterAll' : mode === 'pass' ? 'filterPass' : 'filterFail').classList.add('active');
    renderTree();
}

// ── Tree ─────────────────────────────────────────────────────────────────────

function renderTree() {
    const q    = document.getElementById('treeSearch').value.toLowerCase();
    let files  = allFiles;
    if (filterMode === 'pass') files = files.filter(f => f.result === 'pass');
    if (filterMode === 'fail') files = files.filter(f => f.result === 'fail');
    if (q) files = files.filter(f => f.filename.toLowerCase().includes(q) || f.stepName.toLowerCase().includes(q));

    // Group by date
    const byDate = {};
    files.forEach(f => {
        const date = f.ts ? f.ts.slice(0, 10) : 'Unknown';
        (byDate[date] = byDate[date] || []).push(f);
    });

    const scroll = document.getElementById('treeScroll');
    if (!files.length) {
        scroll.innerHTML = `<div style="padding:18px;font-size:0.72rem;color:var(--text-muted);text-align:center;">No reports match</div>`;
        return;
    }

    let html = '';
    Object.keys(byDate).sort().reverse().forEach(date => {
        html += `<div class="tg-date">${date}</div>`;
        byDate[date].forEach(f => {
            const sel    = f.filename === activeFile ? ' sel' : '';
            const badge  = f.result === 'pass' ? 'pass' : f.result === 'fail' ? 'fail' : 'unknown';
            const scoreH = f.score != null ? `<span class="tfile-score ${badge}">${f.score}%</span>` : '';
            const label  = f.stepName || f.filename.replace(/^TestReport_/, '').replace(/_\d{8}_\d{6}\.json$/, '').replace(/_/g, ' ');
            const time   = f.ts ? f.ts.slice(11) : '';
            html += `
            <div class="tfile${sel}" onclick="loadReport('${f.filename}')">
                <div class="tfile-badge ${badge}"></div>
                <div class="tfile-info">
                    <div class="tfile-name">${label}</div>
                    <div class="tfile-meta">${time} · ${kb(f.size_bytes)} ${scoreH}</div>
                </div>
            </div>`;
        });
    });

    scroll.innerHTML = html;
}

// ── Load report ───────────────────────────────────────────────────────────────

async function loadReport(filename) {
    activeFile = filename;
    renderTree();

    document.getElementById('contentEmpty').style.display  = 'none';
    document.getElementById('contentScroll').style.display = 'flex';
    document.getElementById('contentScroll').style.flexDirection = 'column';
    document.getElementById('reportContent').innerHTML = `<div class="loading"><div class="spinner"></div> Loading report…</div>`;

    try {
        const res  = await fetch(`${API}/output_file/${encodeURIComponent(filename)}`);
        const data = await res.json();
        renderReport(data);
    } catch(e) {
        document.getElementById('reportContent').innerHTML = `<div style="color:#ef4444;padding:20px;font-size:0.8rem;">Failed to load: ${e.message}</div>`;
    }
}

// ── Render report ─────────────────────────────────────────────────────────────

function renderReport(d) {
    const meta   = d.report_metadata    || {};
    const summ   = d.test_run_summary   || d.test_run || {};
    const cases  = d.test_cases         || [];
    const issues = d.issues             || [];
    const recs   = d.recommendations    || [];

    const overall  = (summ.overall_result || '').toUpperCase();
    const score    = summ.score    != null ? summ.score    : (summ.passed && summ.total_tests ? Math.round(summ.passed / summ.total_tests * 100) : 0);
    const passed   = summ.passed   || 0;
    const failed   = summ.failed   || (cases.length - passed);
    const total    = summ.total_tests || cases.length;
    const isPass   = overall === 'PASS';

    // ── Header
    let html = `
    <div class="rpt-header">
        <div class="rpt-header-top">
            <div class="rpt-result ${overall}">${overall || '?'}</div>
            <div class="rpt-step-name">${esc(meta.step_name || 'Validation Report')}</div>
        </div>
        <div class="rpt-meta">
            ${meta.timestamp      ? `<div class="rpt-meta-item">🕐 <strong>${fmtTs(meta.timestamp)}</strong></div>` : ''}
            ${meta.model_used     ? `<div class="rpt-meta-item">🤖 <strong>${esc(meta.model_used)}</strong></div>` : ''}
            ${meta.validation_method ? `<div class="rpt-meta-item">⚙ <strong>${esc(meta.validation_method)}</strong></div>` : ''}
            ${summ.confidence     ? `<div class="rpt-meta-item">Confidence: <strong>${esc(summ.confidence)}</strong></div>` : ''}
        </div>
    </div>`;

    // ── Score cards
    html += `
    <div class="score-grid">
        <div class="score-card"><div class="score-val total">${total}</div><div class="score-label">Total Tests</div></div>
        <div class="score-card"><div class="score-val pass">${passed}</div><div class="score-label">Passed</div></div>
        <div class="score-card"><div class="score-val fail">${failed}</div><div class="score-label">Failed</div></div>
        <div class="score-card"><div class="score-val pct">${score}%</div><div class="score-label">Score</div></div>
    </div>`;

    // ── Score bar
    html += `
    <div class="score-bar-wrap">
        <div class="score-bar-label"><span>Test pass rate</span><span>${passed} / ${total}</span></div>
        <div class="score-bar-track">
            <div class="score-bar-fill ${isPass ? 'pass' : 'fail'}" style="width:${score}%"></div>
        </div>
        ${summ.summary ? `<div class="score-summary">${esc(summ.summary)}</div>` : ''}
    </div>`;

    // ── Failed tests first
    const failedCases  = cases.filter(tc => tc.result === 'FAIL');
    const passedCases  = cases.filter(tc => tc.result !== 'FAIL');

    if (failedCases.length) {
        html += `<div class="sec-title">Failed Tests <span class="sec-count fail">${failedCases.length}</span></div>`;
        html += failedCases.map(tc => renderTC(tc)).join('');
    }

    if (passedCases.length) {
        html += `<div class="sec-title">Passed Tests <span class="sec-count">${passedCases.length}</span></div>`;
        html += passedCases.map(tc => renderTC(tc)).join('');
    }

    // ── Issues
    if (issues.length) {
        html += `<div class="sec-title">Issues <span class="sec-count fail">${issues.length}</span></div>`;
        html += `<div class="issue-list">${issues.map(i => `<div class="issue-item">⚠ ${esc(i)}</div>`).join('')}</div>`;
    }

    // ── Recommendations
    if (recs.length) {
        html += `<div class="sec-title">Recommendations <span class="sec-count">${recs.length}</span></div>`;
        html += `<div class="rec-list">${recs.map(r => `<div class="rec-item">💡 ${esc(r)}</div>`).join('')}</div>`;
    }

    html += '<div style="height:30px;"></div>';
    document.getElementById('reportContent').innerHTML = html;
}

function renderTC(tc) {
    const pass    = tc.result === 'PASS';
    const cls     = pass ? 'pass' : 'fail';
    const catKey  = (tc.category || '').toLowerCase().replace(/[^a-z_]/g, '');
    const id      = `tc_${tc.test_id || Math.random().toString(36).slice(2)}`;
    const mismatch= !pass ? ' mismatch' : ' ok';

    return `
    <div class="tc-card ${cls}">
        <div class="tc-hdr" onclick="toggleTC('${id}')">
            <div class="tc-dot ${cls}"></div>
            <div class="tc-id">${esc(tc.test_id || '')}</div>
            <div class="tc-name">${esc(tc.test_name || '')}</div>
            <div class="tc-cat ${catKey}">${esc(tc.category || '')}</div>
            <div class="tc-chev" id="${id}_chev">▾</div>
        </div>
        <div class="tc-body" id="${id}_body">
            ${tc.description ? `<div class="tc-row"><div class="tc-lbl">Description</div><div class="tc-val">${esc(tc.description)}</div></div>` : ''}
            ${tc.input_data  ? `<div class="tc-row"><div class="tc-lbl">Input Examined</div><div class="tc-val">${esc(tc.input_data)}</div></div>` : ''}
            ${tc.expected_output ? `<div class="tc-row"><div class="tc-lbl">Expected</div><div class="tc-val expected">${esc(tc.expected_output)}</div></div>` : ''}
            ${tc.actual_output   ? `<div class="tc-row"><div class="tc-lbl">Actual</div><div class="tc-val actual${mismatch}">${esc(tc.actual_output)}</div></div>` : ''}
            ${tc.execution_notes ? `<div class="tc-row"><div class="tc-lbl">Execution Notes</div><div class="tc-notes">${esc(tc.execution_notes)}</div></div>` : ''}
            ${tc.reasoning ? `<div class="tc-row"><div class="tc-lbl">Reasoning</div><div class="tc-reason">${esc(tc.reasoning)}</div></div>` : ''}
        </div>
    </div>`;
}

function toggleTC(id) {
    const body = document.getElementById(`${id}_body`);
    const chev = document.getElementById(`${id}_chev`);
    if (!body) return;
    const open = body.classList.toggle('open');
    if (chev) chev.classList.toggle('open', open);
}

// ── Helpers ───────────────────────────────────────────────────────────────────

function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g,'<br>');
}
function kb(bytes) {
    return bytes > 1024 ? `${(bytes/1024).toFixed(0)} KB` : `${bytes} B`;
}
function fmtTs(ts) {
    // "20260310_051449" → "2026-03-10 05:14:49"
    const m = String(ts).match(/^(\d{4})(\d{2})(\d{2})_(\d{2})(\d{2})(\d{2})$/);
    return m ? `${m[1]}-${m[2]}-${m[3]} ${m[4]}:${m[5]}:${m[6]}` : ts;
}

function toggleTheme() {
    const light = document.documentElement.classList.toggle('light');
    localStorage.setItem('theme', light ? 'light' : 'dark');
    const btn = document.getElementById('themeToggleBtn');
    if (btn) btn.textContent = light ? '🌙' : '☀️';
}
(function(){ const b=document.getElementById('themeToggleBtn'); if(b) b.textContent=document.documentElement.classList.contains('light')?'🌙':'☀️'; })();

boot();
</script>
</body>
</html>
