server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /api/decomposer/ {
        proxy_pass         https://decomposer.thankfultree-891e0071.australiaeast.azurecontainerapps.io/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header   Connection "";
        proxy_set_header   Host decomposer.thankfultree-891e0071.australiaeast.azurecontainerapps.io;
        proxy_connect_timeout 15s;
        proxy_read_timeout    120s;
        proxy_send_timeout    30s;
        client_max_body_size  50m;
    }

    location /api/orchestrator/ {
        proxy_pass         https://orchestrator.thankfultree-891e0071.australiaeast.azurecontainerapps.io/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header   Connection "";
        proxy_set_header   Host orchestrator.thankfultree-891e0071.australiaeast.azurecontainerapps.io;
        proxy_connect_timeout 15s;
        proxy_read_timeout    180s;
        proxy_send_timeout    30s;
        client_max_body_size  50m;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
