resolver __RESOLVER__ valid=30s ipv6=off;

server {
    listen 80;
    http2 on;
    root /usr/share/nginx/html;
    index index.html;

    location /api/decomposer/ {
        set $responder_upstream responder.internal.reddesert-36d5f493.australiaeast.azurecontainerapps.io;
        rewrite ^/api/decomposer/(.*) /$1 break;
        proxy_pass         http://$responder_upstream:80;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $responder_upstream;
        proxy_connect_timeout 15s;
        proxy_read_timeout    120s;
        proxy_send_timeout    30s;
        client_max_body_size  50m;
    }

    location /api/orchestrator/ {
        set $orchestrator_upstream orchestrator.internal.reddesert-36d5f493.australiaeast.azurecontainerapps.io;
        rewrite ^/api/orchestrator/(.*) /$1 break;
        proxy_pass         http://$orchestrator_upstream:80;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $orchestrator_upstream;
        proxy_connect_timeout 15s;
        proxy_read_timeout    1200s;
        proxy_send_timeout    120s;
        client_max_body_size  50m;
        proxy_buffering       off;
    }

    location /api/chunker/ {
        set $chunker_upstream document-chunker.internal.reddesert-36d5f493.australiaeast.azurecontainerapps.io;
        rewrite ^/api/chunker/(.*) /$1 break;
        proxy_pass         http://$chunker_upstream:80;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $chunker_upstream;
        proxy_connect_timeout 15s;
        proxy_read_timeout    300s;
        proxy_send_timeout    30s;
        client_max_body_size  100m;
    }

    location / {
        try_files $uri $uri/ =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
}
